services:
  postgres:
    image: postgres:15
    container_name: watchme-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: moviesdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d moviesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend and Frontend Dockerfiles will be added in Part 9
  # For now, run the backend locally with: cd backend && go run main.go

volumes:
  postgres_data:
