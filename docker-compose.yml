# ═══════════════════════════════════════════════════════════════════
# WATCHME — Docker Compose
# Single command: docker compose up -d
# ═══════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moviesdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d moviesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=moviesdb
      - SERVER_PORT=8000
    volumes:
      - movies_data:/data/movies
      - posters_data:/data/posters
      - config_data:/data/config
    ports:
      - "8000:8000"

  # ── Vite Frontend (nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  movies_data:
  posters_data:
  config_data:
